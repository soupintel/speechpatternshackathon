<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPEECH CONSTELLATION</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- The artwork: full-screen canvas behind everything -->
    <canvas id="constellation"></canvas>

    <!-- HUD: instrument strip overlaid on top of the artwork -->
    <header class="hud">
      <div class="hud__title">
        <span class="hud__mark">◉</span> SPEECH·CONSTELLATION
      </div>

      <div class="hud__controls">
        <button id="micButton" type="button">START MIC</button>
        <button id="clearButton" type="button" class="hud__clear">CLEAR</button>
        <label class="sens">
          <span class="sens__label">SENS</span>
          <input id="sensitivity" type="range" min="0.5" max="8" step="0.5" value="1" />
          <span id="sensValue" class="sens__value">1.0×</span>
        </label>
      </div>

      <div class="hud__readouts">
        <div class="hud__cell">
          <span class="hud__label">F0</span>
          <span class="hud__value"><span id="pitchValue">—</span><small>Hz</small></span>
        </div>
        <div class="hud__cell">
          <span class="hud__label">LVL</span>
          <span class="hud__value"><span id="dbValue">—</span><small>dBFS</small></span>
        </div>
        <div class="hud__cell">
          <span class="hud__label">GATE</span>
          <span id="voicedValue" class="hud__value hud__value--state">—</span>
        </div>
        <div class="hud__cell">
          <span class="hud__label">N</span>
          <span id="unitCount" class="hud__value">0</span>
        </div>
        <span id="status" class="status status--idle">[ idle ]</span>
      </div>

      <!-- Phase A verification bench: raw spectral features, live. TEMPORARY —
           goes away once the 3D axes display these numbers themselves. -->
      <div class="specbench">
        <span class="specbench__tag">SPECTRAL</span>
        <div class="hud__cell">
          <span class="hud__label">CENT</span>
          <span class="hud__value"><span id="centValue">—</span><small>Hz</small></span>
        </div>
        <div class="hud__cell">
          <span class="hud__label">SPRD</span>
          <span class="hud__value"><span id="sprdValue">—</span><small>Hz</small></span>
        </div>
        <div class="hud__cell">
          <span class="hud__label">FLUX</span>
          <span class="hud__value"><span id="fluxValue">—</span><small>/s</small></span>
        </div>
        <div class="hud__cell">
          <span class="hud__label">CREST</span>
          <span class="hud__value"><span id="crestValue">—</span><small>×</small></span>
        </div>
      </div>
    </header>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
